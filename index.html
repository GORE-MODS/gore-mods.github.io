<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gore-mods</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #030303;
            --panel-bg: rgba(7, 7, 7, 0.65);
            --accent-red: #ff2a2a;
            --accent-glow: rgba(255, 42, 42, 0.25);
            --text-main: #ffffff;
            --text-muted: #999999;
            --border-glow: rgba(255, 42, 42, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #canvas-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .ambient-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255, 42, 42, 0.05) 0%, transparent 70%);
            z-index: 2;
            pointer-events: none;
        }
        
        .custom-cursor {
            width: 24px;
            height: 24px;
            border: 1.5px solid var(--accent-red);
            border-radius: 50%;
            position: fixed;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 9999;
            transition: width 0.25s, height 0.25s, background-color 0.25s, border-color 0.25s;
        }

        .custom-cursor-dot {
            width: 5px;
            height: 5px;
            background-color: var(--accent-red);
            border-radius: 50%;
            position: fixed;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 9999;
        }
        
        #enter-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.6s;
        }

        #enter-overlay.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        .enter-text {
            font-family: 'Syne', sans-serif;
            font-size: 1.25rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: var(--text-main);
            text-shadow: 0 0 20px var(--accent-glow);
            animation: pulse-glow 2.5s infinite ease-in-out;
        }
        
        #main-card {
            position: relative;
            z-index: 10;
            width: 440px;
            max-width: 92%;
            background: var(--panel-bg);
            border: 1px solid var(--border-glow);
            border-radius: 24px;
            padding: 45px 35px;
            text-align: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            opacity: 0;
            transform: scale(0.94) translateY(15px);
            transition: opacity 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #main-card.reveal {
            opacity: 1;
            transform: scale(1) translateY(0);
        }
        
        .avatar-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 25px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent-red);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .verified-badge {
            position: absolute;
            bottom: 4px;
            right: 4px;
            background: var(--accent-red);
            color: #fff;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.8rem;
            box-shadow: 0 0 15px var(--accent-red);
        }

        .username {
            font-family: 'Syne', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
            background: linear-gradient(180deg, #fff 0%, #bbbbbb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .typewriter-container {
            height: 20px;
            margin-bottom: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .typewriter-text {
            font-size: 0.9rem;
            color: var(--accent-red);
            font-weight: 600;
            letter-spacing: 0.5px;
            border-right: 2px solid var(--accent-red);
            white-space: nowrap;
            animation: blink-cursor 0.8s step-end infinite;
        }

        .badge-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .badge {
            background: rgba(255, 42, 42, 0.06);
            border: 1px solid rgba(255, 42, 42, 0.15);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.72rem;
            font-weight: 600;
            color: #ff6666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 35px;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 16px 22px;
            border-radius: 14px;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.25s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .link-item:hover {
            transform: translateY(-3px);
            background: rgba(255, 42, 42, 0.04);
            border-color: rgba(255, 42, 42, 0.4);
            box-shadow: 0 10px 25px rgba(255, 42, 42, 0.08);
        }

        .link-item span {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .link-item i {
            font-size: 1.25rem;
            color: #ffffff;
            transition: color 0.25s;
        }

        .link-item:hover i {
            color: var(--accent-red);
        }

        .link-item .fa-chevron-right {
            font-size: 0.75rem;
            color: var(--text-muted);
            opacity: 0.4;
        }

        /* Premium Media Deck */
        .audio-player {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 14px 24px;
            border-radius: 40px;
        }

        .track-info {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 0.85rem;
            text-align: left;
        }

        .track-info i {
            color: var(--accent-red);
            font-size: 1.1rem;
            animation: spin-disc 3.5s linear infinite;
            animation-play-state: paused;
        }

        .track-name {
            font-weight: 600;
            display: block;
            color: var(--text-main);
        }

        .track-artist {
            color: var(--text-muted);
            font-size: 0.75rem;
            margin-top: 1px;
            display: block;
        }

        .audio-controls button {
            background: none;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            font-size: 1.1rem;
            width: 32px;
            height: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: color 0.2s;
        }

        .audio-controls button:hover {
            color: var(--accent-red);
        }
        
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; text-shadow: 0 0 30px var(--accent-red); }
        }

        @keyframes spin-disc {
            100% { transform: rotate(360deg); }
        }

        @keyframes blink-cursor {
            from, to { border-color: transparent }
            50% { border-color: var(--accent-red); }
        }
        
        @media (max-width: 768px) {
            .custom-cursor, .custom-cursor-dot {
                display: none;
            }
            body {
                cursor: auto;
            }
        }
    </style>
</head>
<body>
    
    <div class="custom-cursor" id="cursor"></div>
    <div class="custom-cursor-dot" id="cursor-dot"></div>
    <canvas id="canvas-bg"></canvas>
    <div class="ambient-overlay"></div>
    
    <div id="enter-overlay">
        <div class="enter-text">click to explore</div>
    </div>
    
    <div id="main-card">
        <div class="avatar-container">
            <img src="https://github.com/GORE-MODS.png" alt="GORE-MODS Avatar" class="avatar">
            <div class="verified-badge" title="Verified Creator">
                <i class="fas fa-check"></i>
            </div>
        </div>

        <h1 class="username">GORE-MODS</h1>
        
        <div class="typewriter-container">
            <div class="typewriter-text" id="typewriter"></div>
        </div>
        
        <div class="badge-row">
            <span class="badge"><i class="fas fa-code"></i> Developer</span>
        </div>
        
        <div class="links-container">
            <a href="https://github.com/GORE-MODS" target="_blank" class="link-item">
                <span><i class="fab fa-github"></i>Repositories</span>
                <i class="fas fa-chevron-right"></i>
            </a>
            
        <div class="audio-player">
            <div class="track-info">
                <i class="fas fa-compact-disc" id="disc-icon"></i>
                <div>
                    <span class="track-name">Cyber-Line Environment</span>
                    <span class="track-artist">Audio Subsystem</span>
                </div>
            </div>
            <div class="audio-controls">
                <button id="play-btn"><i class="fas fa-play"></i></button>
            </div>
        </div>
    </div>
        
    <audio id="bg-audio" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

    <script>
        const overlay = document.getElementById('enter-overlay');
        const card = document.getElementById('main-card');
        const audio = document.getElementById('bg-audio');
        const playBtn = document.getElementById('play-btn');
        const discIcon = document.getElementById('disc-icon');
        const cursor = document.getElementById('cursor');
        const cursorDot = document.getElementById('cursor-dot');
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        const phrases = ["Brainfuck is a very good language.", "Yes github.", "Yes make mod :3.", "AHHHHHHHHH"];
        let phraseIdx = 0;
        let charIdx = 0;
        let isDeleting = false;
        const typewriterEl = document.getElementById('typewriter');

        function runTypewriter() {
            const currentPhrase = phrases[phraseIdx];
            if (isDeleting) {
                typewriterEl.textContent = currentPhrase.substring(0, charIdx - 1);
                charIdx--;
            } else {
                typewriterEl.textContent = currentPhrase.substring(0, charIdx + 1);
                charIdx++;
            }

            let typeSpeed = isDeleting ? 35 : 75;

            if (!isDeleting && charIdx === currentPhrase.length) {
                typeSpeed = 1800;
                isDeleting = true;
            } else if (isDeleting && charIdx === 0) {
                isDeleting = false;
                phraseIdx = (phraseIdx + 1) % phrases.length;
                typeSpeed = 400;
            }

            setTimeout(runTypewriter, typeSpeed);
        }
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        const particles = [];
        class DustParticle {
            constructor() {
                this.reset();
                this.y = Math.random() * canvas.height;
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 10;
                this.size = Math.random() * 1.8 + 0.4;
                this.speedY = Math.random() * 0.6 + 0.1;
                this.opacity = Math.random() * 0.4 + 0.1;
                this.drift = Math.sin(Math.random() * 2);
            }
            update() {
                this.y -= this.speedY;
                this.x += Math.sin(this.y / 30) * 0.2;
                if (this.y < -10 || this.x < 0 || this.x > canvas.width) {
                    this.reset();
                }
            }
            draw() {
                ctx.fillStyle = `rgba(255, 42, 42, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 75; i++) {
            particles.push(new DustParticle());
        }

        function drawBackgroundLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(drawBackgroundLoop);
        }
        drawBackgroundLoop();
        
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            cursorDot.style.left = e.clientX + 'px';
            cursorDot.style.top = e.clientY + 'px';
        });

        const activeTargets = document.querySelectorAll('a, button, #enter-overlay');
        activeTargets.forEach(target => {
            target.addEventListener('mouseenter', () => {
                cursor.style.width = '42px';
                cursor.style.height = '42px';
                cursor.style.backgroundColor = 'rgba(255, 42, 42, 0.08)';
                cursor.style.borderColor = 'var(--accent-red)';
            });
            target.addEventListener('mouseleave', () => {
                cursor.style.width = '24px';
                cursor.style.height = '24px';
                cursor.style.backgroundColor = 'transparent';
            });
        });
        
        overlay.addEventListener('click', () => {
            overlay.classList.add('fade-out');
            card.classList.add('reveal');
            
            audio.play().catch(() => console.log("Media engine requires manual user interface click event."));
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
            discIcon.style.animationPlayState = 'running';
            
            setTimeout(runTypewriter, 400);
        });
        
        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                discIcon.style.animationPlayState = 'running';
            } else {
                audio.pause();
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                discIcon.style.animationPlayState = 'paused';
            }
        });
    </script>
</body>
</html>
